<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="page">
    <nav class="tabs" aria-label="Primary">
      <a href="/top-slops">Top Slops</a>
      <a href="/faqs">FAQs</a>
    </nav>

    <section class="search-stage">
      <div class="search-copy">
        <p class="eyebrow">Community reports, not verdicts</p>
        <h1>AI Slop Detector</h1>
      </div>

      {{if .Error}}<p class="notice error">{{.Error}}</p>{{end}}
      {{if .Flash}}<p class="notice success">{{.Flash}}</p>{{end}}

      <form class="search-box" action="/lookup" method="get">
        <label for="lookup">Search a website</label>
        <div class="search-row">
          <input id="lookup" name="input" type="text" placeholder="example.com" autofocus required>
          <button type="submit">Search</button>
        </div>
      </form>
    </section>

  </main>
</body>
</html>
